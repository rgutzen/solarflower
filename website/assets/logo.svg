<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8920E"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D7DD2"/>
      <stop offset="100%" stop-color="#1B5FA0"/>
    </linearGradient>
  </defs>
  <!-- Petals (sunflower rays) -->
  <g transform="translate(60,60)">
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(0) translate(0,-30)" opacity="0.95"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(30) translate(0,-30)" opacity="0.9"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(60) translate(0,-30)" opacity="0.95"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(90) translate(0,-30)" opacity="0.9"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(120) translate(0,-30)" opacity="0.95"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(150) translate(0,-30)" opacity="0.9"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(180) translate(0,-30)" opacity="0.95"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(210) translate(0,-30)" opacity="0.9"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(240) translate(0,-30)" opacity="0.95"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(270) translate(0,-30)" opacity="0.9"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(300) translate(0,-30)" opacity="0.95"/>
    <ellipse rx="8" ry="24" fill="url(#petalGrad)" transform="rotate(330) translate(0,-30)" opacity="0.9"/>
  </g>
  <!-- Center disc — solar panel grid -->
  <circle cx="60" cy="60" r="18" fill="url(#centerGrad)"/>
  <!-- Panel grid lines -->
  <line x1="52" y1="44" x2="52" y2="76" stroke="#fff" stroke-width="0.6" opacity="0.5"/>
  <line x1="60" y1="44" x2="60" y2="76" stroke="#fff" stroke-width="0.6" opacity="0.5"/>
  <line x1="68" y1="44" x2="68" y2="76" stroke="#fff" stroke-width="0.6" opacity="0.5"/>
  <line x1="44" y1="52" x2="76" y2="52" stroke="#fff" stroke-width="0.6" opacity="0.5"/>
  <line x1="44" y1="60" x2="76" y2="60" stroke="#fff" stroke-width="0.6" opacity="0.5"/>
  <line x1="44" y1="68" x2="76" y2="68" stroke="#fff" stroke-width="0.6" opacity="0.5"/>
</svg>
