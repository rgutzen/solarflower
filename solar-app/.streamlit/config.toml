[theme]
primaryColor              = "#E8920E"
backgroundColor           = "#F8FAF5"
secondaryBackgroundColor  = "#FEFDF5"
textColor                 = "#2D3B2D"
font                      = "sans serif"

[server]
# Allow embedding in iframes (needed for the website embed)
enableCORS = false
enableXsrfProtection = false
headless = true
