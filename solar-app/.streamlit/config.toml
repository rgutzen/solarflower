[theme]
primaryColor     = "#F5A623"
backgroundColor  = "#0e1117"
secondaryBackgroundColor = "#1e1e2e"
textColor        = "#fafafa"
font             = "sans serif"

[server]
# Allow embedding in iframes (needed for the website embed)
enableCORS = false
enableXsrfProtection = false
headless = true
