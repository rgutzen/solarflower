<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Warm gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEFDF5"/>
      <stop offset="100%" stop-color="#F1F8E9"/>
    </linearGradient>
    <!-- Amber gradient for compass body -->
    <linearGradient id="amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D48B10"/>
    </linearGradient>
    <!-- Green dark for needle -->
    <linearGradient id="needle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B2E1B"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Compass outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#1B2E1B" stroke-width="6" opacity="0.12"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="#1B2E1B" stroke-width="2" opacity="0.08"/>

  <!-- Tick marks (every 30°) -->
  <g stroke="#1B2E1B" stroke-width="4" stroke-linecap="round" opacity="0.35">
    <line x1="256" y1="72" x2="256" y2="100" />
    <line x1="349" y1="102.3" x2="335" y2="126.6" transform="rotate(0 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(30 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(60 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(90 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(120 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(150 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(180 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(210 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(240 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(270 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(300 256 256)"/>
    <line x1="256" y1="72" x2="256" y2="100" transform="rotate(330 256 256)"/>
  </g>

  <!-- Cardinal labels -->
  <g font-family="Georgia, serif" font-weight="700" font-size="36" fill="#1B2E1B" text-anchor="middle" dominant-baseline="central">
    <text x="256" y="118">N</text>
    <text x="394" y="260">E</text>
    <text x="256" y="402">S</text>
    <text x="118" y="260">W</text>
  </g>

  <!-- Compass needle — north (amber/red) -->
  <polygon points="256,95 238,256 274,256" fill="#E63946" opacity="0.85"/>

  <!-- Compass needle — south (dark) -->
  <polygon points="256,417 238,256 274,256" fill="#1B2E1B" opacity="0.25"/>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="20" fill="#FCFCFA" stroke="#1B2E1B" stroke-width="3"/>
  <circle cx="256" cy="256" r="8" fill="url(#amber)"/>

  <!-- Sun accent (top-right) -->
  <circle cx="380" cy="130" r="32" fill="#F5A623" opacity="0.2"/>
  <circle cx="380" cy="130" r="18" fill="#F5A623" opacity="0.35"/>
</svg>
